<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vocal Note — Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#050816" />

  <link rel="stylesheet" href="../styles.css" />
</head>
<body>

  <header class="top-bar">
    <h1>Calendar</h1>
  </header>

  <main class="main">

    <section class="calendar-header">
      <button id="prevMonth" class="ghost">‹</button>
      <h2 id="calendarMonth"></h2>
      <button id="nextMonth" class="ghost">›</button>
    </section>

    <section id="calendarGrid" class="calendar-grid">
      <!-- Calendar days injected by JS -->
    </section>

    <section id="calendarEvents" class="calendar-events">
      <h3>Events</h3>
      <div id="eventsList"></div>
    </section>

  </main>

  <nav class="bottom-nav">
    <a href="notes.html" class="nav-btn">Notes</a>
    <a href="record.html" class="nav-btn">Record</a>

    <a href="calendar.html" class="nav-btn active">Calendar</a>
    <a href="settings.html" class="nav-btn">Settings</a>
  </nav>

</html>
